<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – Stranica nije pronađena | Dr. Anđela Marelj</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text x='50%25' y='54%25' dominant-baseline='central' text-anchor='middle' font-size='26' fill='%232a9d8f'>✦</text></svg>" />
  <script>if(localStorage.getItem('darkMode')==='on')document.documentElement.classList.add('dark');else localStorage.setItem('darkMode','off');</script>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: var(--bg);
      color: var(--text);
    }

    .error-number {
      font-family: 'Playfair Display', serif;
      font-size: clamp(6rem, 20vw, 14rem);
      font-weight: 600;
      line-height: 1;
      color: var(--teal);
      opacity: 0.15;
      user-select: none;
      margin-bottom: -1rem;
    }

    .error-icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0);    }
      50%       { transform: translateY(-10px); }
    }

    .error-page h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: var(--heading);
    }

    .error-page p {
      font-family: 'Inter', sans-serif;
      font-size: 1.05rem;
      color: var(--text-muted);
      max-width: 420px;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .error-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .error-actions .btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.7rem 1.6rem;
      border-radius: 100px;
      text-decoration: none;
      transition: all .25s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }

    .error-actions .btn-primary {
      background: var(--teal);
      color: #fff;
      border: none;
    }

    .error-actions .btn-primary:hover {
      background: var(--teal-dark, #228B7E);
      transform: translateY(-2px);
    }

    .error-actions .btn-outline {
      background: transparent;
      color: var(--teal);
      border: 1.5px solid var(--teal);
    }

    .error-actions .btn-outline:hover {
      background: var(--teal);
      color: #fff;
      transform: translateY(-2px);
    }

    /* Dark mode toggle (reuse same logic as main page) */
    .error-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
      z-index: 100;
    }

    .error-nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--heading);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .error-nav-logo span {
      color: var(--teal);
    }
  </style>
</head>
<body>

  <!-- Minimal nav -->
  <nav class="error-nav">
    <a href="/" class="error-nav-logo">
      <span>✦</span> Dr. Marelj
    </a>
    <button class="dark-toggle" id="darkToggle404" aria-label="Promeni temu" title="Promeni temu">
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </nav>

  <!-- Error content -->
  <main class="error-page">
    <div class="error-number">404</div>
    <div class="error-icon">🦷</div>
    <h1>Stranica nije pronađena</h1>
    <p>Izgleda da ste zalutali. Stranica koju tražite ne postoji ili je premeštena.</p>
    <div class="error-actions">
      <a href="/" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Početna strana
      </a>
      <a href="/#contact" class="btn btn-outline">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.56 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.12 6.12l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        Zakažite pregled
      </a>
    </div>
  </main>

  <script>
    // Dark mode toggle
    const btn = document.getElementById('darkToggle404');
    if (btn) {
      btn.addEventListener('click', () => {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('darkMode', isDark ? 'on' : 'off');
      });
    }
  </script>
</body>
</html>
